name: Daily Stock Analysis

on:
  schedule:
    # UTC 08:30 = KST 17:30 (평일만)
    # post-market(16:30) OHLCV 수집 완료 후 1시간 여유
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 수동 실행

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-analysis.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-analysis.txt

      - name: Run analysis
        run: python scripts/run_analysis.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      # - name: Generate LLM summaries >> 추 후 엔트포픽 api key 등록 후 활 성화
      #   run: python scripts/generate_summaries.py --limit 50
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #     DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Discord notification (failure)
        if: failure()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Daily Analysis Workflow\",\"color\":15158332,\"fields\":[{\"name\":\"Status\",\"value\":\"\u274c FAILED\",\"inline\":true},{\"name\":\"Run\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"inline\":false}],\"footer\":{\"text\":\"omnia-invest\"}}]}"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
